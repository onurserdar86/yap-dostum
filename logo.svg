<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#357a58"/>
      <stop offset="1" stop-color="#1f4d35"/>
    </linearGradient>
  </defs>

  <!-- arka plan: yuvarlatılmış kare -->
  <rect x="4" y="4" width="192" height="192" rx="46" fill="url(#bg)"/>

  <!-- checklist kartı -->
  <g>
    <rect x="52" y="40" width="96" height="120" rx="14" fill="#ffffff"/>
    <!-- kartın üstündeki klips -->
    <rect x="82" y="30" width="36" height="18" rx="9" fill="#e8a33d"/>

    <!-- görev satırı 1 (tamamlanmış) -->
    <circle cx="72" cy="76" r="9" fill="#e8a33d"/>
    <path d="M67.5 76 L70.5 79.5 L77 71.5" stroke="#ffffff" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="90" y="71" width="46" height="9" rx="4.5" fill="#dfe6e0"/>

    <!-- görev satırı 2 (tamamlanmış) -->
    <circle cx="72" cy="104" r="9" fill="#2f6f4f"/>
    <path d="M67.5 104 L70.5 107.5 L77 99.5" stroke="#ffffff" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="90" y="99" width="46" height="9" rx="4.5" fill="#dfe6e0"/>

    <!-- görev satırı 3 (bekliyor) -->
    <circle cx="72" cy="132" r="9" fill="none" stroke="#c9d3cb" stroke-width="3"/>
    <rect x="90" y="127" width="34" height="9" rx="4.5" fill="#dfe6e0"/>
  </g>

  <!-- iki nokta: sahip + dost bağlantısı -->
  <circle cx="46" cy="150" r="9" fill="#e8a33d"/>
  <circle cx="60" cy="162" r="6" fill="#ffffff" fill-opacity="0.55"/>
</svg>
